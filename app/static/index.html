<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书法字体制作器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cinnabar: #B8433A;
            --cinnabar-deep: #8C2F28;
            --cinnabar-light: rgba(184, 67, 58, 0.08);
            --ink: #1C1917;
            --ink-secondary: #44403C;
            --ink-muted: #78716C;
            --ink-faint: #A8A29E;
            --paper: #F5F0EB;
            --card: #FDFAF7;
            --card-alt: #F9F5F0;
            --gold: #C9A96E;
            --gold-light: rgba(201, 169, 110, 0.15);
            --success: #5B8C5A;
            --error: #C75050;
            --border: #E0D8D0;
            --border-light: #EDE8E2;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow-sm: 0 1px 2px rgba(28, 25, 23, 0.05);
            --shadow: 0 2px 8px rgba(28, 25, 23, 0.06), 0 1px 2px rgba(28, 25, 23, 0.04);
            --shadow-lg: 0 12px 32px rgba(28, 25, 23, 0.08), 0 2px 8px rgba(28, 25, 23, 0.04);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "SimSun", "PingFang SC", serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(184, 67, 58, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(201, 169, 110, 0.04) 0%, transparent 40%);
        }

        .header {
            background: var(--ink);
            color: #F5F0EB;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.875rem 2rem;
            border-bottom: 2px solid var(--cinnabar);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.15em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .header-actions a {
            color: #A8A29E;
            transition: color 0.2s;
            display: flex;
        }
        .header-actions a:hover { color: #F5F0EB; }

        .btn {
            padding: 0.4375rem 0.875rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 0.03em;
        }

        .btn-primary { background: var(--cinnabar); color: #fff; }
        .btn-primary:hover { background: var(--cinnabar-deep); }
        .btn-ghost { background: rgba(245, 240, 235, 0.08); color: #A8A29E; }
        .btn-ghost:hover { background: rgba(245, 240, 235, 0.15); color: #F5F0EB; }
        .btn-danger-outline { background: transparent; color: var(--ink-faint); border: 1px solid var(--border); }
        .btn-danger-outline:hover { border-color: var(--error); color: var(--error); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #4A7A49; }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Toolbar */
        .toolbar {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            margin-bottom: 1.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            flex-wrap: wrap;
        }

        .toolbar-label {
            font-size: 0.8125rem;
            color: var(--ink-muted);
            white-space: nowrap;
        }

        .font-name-input {
            padding: 0.4375rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-family: inherit;
            background: var(--card-alt);
            color: var(--ink);
            width: 160px;
            transition: border-color 0.2s;
        }
        .font-name-input:focus { outline: none; border-color: var(--cinnabar); }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .stat-chip {
            font-size: 0.8125rem;
            color: var(--ink-muted);
        }
        .stat-chip strong {
            color: var(--cinnabar);
            font-weight: 700;
        }

        /* Upload */
        .upload-section {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.75rem;
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            color: var(--ink-secondary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title::before {
            content: '';
            width: 3px;
            height: 1em;
            background: var(--cinnabar);
            border-radius: 2px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.25s var(--ease);
            cursor: pointer;
            background: var(--card-alt);
        }
        .upload-area:hover { border-color: var(--cinnabar); background: var(--cinnabar-light); }
        .upload-area.dragover { border-color: var(--cinnabar); background: var(--cinnabar-light); transform: scale(1.005); }

        .upload-icon { font-size: 2.25rem; margin-bottom: 0.75rem; opacity: 0.7; }
        .upload-title { font-size: 1rem; font-weight: 500; margin-bottom: 0.375rem; color: var(--ink-secondary); }
        .upload-hint { font-size: 0.8125rem; color: var(--ink-faint); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--ink-muted);
            margin-bottom: -1px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab:hover { color: var(--ink-secondary); }
        .tab.active { color: var(--cinnabar); border-bottom-color: var(--cinnabar); }
        .tab span { font-size: 0.75rem; color: var(--ink-faint); }
        .tab.active span { color: var(--cinnabar); opacity: 0.6; }

        /* Grid */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
            gap: 1.25rem;
        }

        .char-card {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.25s var(--ease);
            box-shadow: var(--shadow-sm);
        }
        .char-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); border-color: var(--border); }

        .char-image {
            width: 100%;
            aspect-ratio: 1;
            background: var(--card-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            border-bottom: 1px solid var(--border-light);
        }
        .char-image img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .char-content { padding: 0.875rem; }

        .char-input {
            width: 100%;
            padding: 0.5rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 0.5rem;
            background: var(--card-alt);
            transition: border-color 0.2s;
            text-align: center;
            letter-spacing: 0.1em;
        }
        .char-input:focus { outline: none; border-color: var(--cinnabar); background: var(--card); }
        .char-input::placeholder { color: var(--ink-faint); font-size: 0.8125rem; letter-spacing: 0; }

        .char-actions { display: flex; gap: 0.5rem; }
        .char-actions .btn { flex: 1; padding: 0.4375rem 0; }

        .confirmed-char .char-image { background: var(--cinnabar-light); border-bottom: 1px solid rgba(184, 67, 58, 0.1); }
        .confirmed-label { text-align: center; font-size: 1.75rem; font-weight: 700; color: var(--cinnabar); padding: 0.5rem 0; letter-spacing: 0.05em; }
        .confirmed-actions { padding: 0 0.875rem 0.875rem; }
        .confirmed-actions .btn { width: 100%; }

        /* Preview */
        .preview-section {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-top: 1.75rem;
            box-shadow: var(--shadow-sm);
        }

        .preview-section h3 {
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            color: var(--ink-secondary);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .preview-section h3::before {
            content: '';
            width: 3px; height: 1em;
            background: var(--gold);
            border-radius: 2px;
        }

        .preview-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .preview-toolbar select {
            padding: 0.375rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.8125rem;
            background: var(--card-alt);
            color: var(--ink-secondary);
        }
        .font-status { font-size: 0.8125rem; color: var(--ink-faint); }

        .preview-textarea {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 1.25rem;
            line-height: 1.8;
            background: var(--card-alt);
            color: var(--ink);
            transition: border-color 0.2s;
            letter-spacing: 0.05em;
        }
        .preview-textarea:focus { outline: none; border-color: var(--cinnabar); }

        .preview-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .custom-font { font-family: 'PreviewFont', serif; }
        .system-font { font-family: "PingFang SC", "STKaiti", "KaiTi", serif; }
        .preview-label { font-size: 0.75rem; color: var(--ink-faint); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .preview-area {
            min-height: 100px;
            padding: 1.25rem;
            background: var(--card-alt);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-sm);
            line-height: 1.6;
            word-break: break-all;
            color: var(--ink);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(28, 25, 23, 0.45);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 2rem;
            max-width: 460px;
            width: 90%;
            box-shadow: var(--shadow-lg);
        }
        .modal-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; letter-spacing: 0.05em; }
        .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
        .modal-actions .btn { padding: 0.5rem 1.25rem; }

        .about-divider { width: 40px; height: 2px; background: var(--gold); border-radius: 1px; margin: 1.25rem auto; }
        .about-body { font-size: 0.875rem; color: var(--ink-muted); line-height: 1.8; margin-bottom: 1.25rem; }
        .about-credit { padding: 1rem; background: var(--card-alt); border-radius: var(--radius-sm); border: 1px solid var(--border-light); }
        .about-credit p { font-size: 0.8125rem; color: var(--ink-muted); line-height: 1.8; }
        .about-credit .author { color: var(--cinnabar); font-weight: 600; }
        .about-wechat { font-size: 1rem !important; font-weight: 600; color: var(--ink) !important; letter-spacing: 0.08em; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--ink);
            color: #F5F0EB;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            z-index: 1001;
            font-size: 0.8125rem;
            letter-spacing: 0.03em;
            animation: toastIn 0.3s var(--ease);
        }
        .toast.toast-success { background: var(--success); }
        .toast.toast-error { background: var(--error); }
        @keyframes toastIn { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .empty-state { text-align: center; padding: 3rem 2rem; color: var(--ink-faint); }
        .empty-state-icon { font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.5; }
        .empty-state-text { font-size: 0.9375rem; }
        .empty-state-text p:last-child { font-size: 0.8125rem; margin-top: 0.375rem; }

        .footer { text-align: center; padding: 2.5rem 2rem; color: var(--ink-faint); font-size: 0.75rem; letter-spacing: 0.05em; }
        .footer strong { color: var(--ink-muted); }

        .loading {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; gap: 0.75rem; padding: 0.75rem 1.25rem; }
            .main { padding: 1.25rem; }
            .character-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .preview-compare { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: flex-start; }
            .toolbar-divider { width: 100%; height: 1px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">书法字体制作器</div>
            <div class="header-actions">
                <a href="https://github.com/Claud-Lu/autotextdesign" target="_blank" rel="noopener noreferrer" title="GitHub">
                    <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                </a>
                <button id="aboutBtn" class="btn btn-ghost">关于</button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Toolbar -->
        <div class="toolbar">
            <span class="toolbar-label">字体名称</span>
            <input type="text" id="fontNameInput" class="font-name-input" value="未命名字体" placeholder="输入字体名称">
            <div class="toolbar-divider"></div>
            <button id="importTtfBtn" class="btn btn-ghost">导入 TTF</button>
            <div class="toolbar-divider"></div>
            <span class="stat-chip">已收录 <strong id="glyphCount">0</strong> 字</span>
        </div>

        <!-- Upload -->
        <div class="upload-section">
            <div class="section-title">上传字体图片</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">墨</div>
                <div class="upload-title">拖拽、点击或粘贴单字图片</div>
                <div class="upload-hint">支持 PNG、JPG 格式</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="pending">待确认 <span id="pendingCount">(0)</span></button>
            <button class="tab" data-tab="confirmed">已收录 <span id="confirmedCount">(0)</span></button>
        </div>

        <!-- Grids -->
        <div id="pendingGrid" class="character-grid"></div>
        <div id="confirmedGrid" class="character-grid" style="display: none;"></div>

        <!-- Preview -->
        <div class="preview-section" id="previewSection">
            <h3>字体预览</h3>
            <div class="preview-toolbar">
                <a id="downloadFontBtn" class="btn btn-primary" style="display: none; text-decoration: none;">下载字体</a>
                <span id="fontStatus" class="font-status">收录文字后生成预览</span>
            </div>
            <textarea id="previewInput" class="preview-textarea" rows="2" placeholder="输入预览文字...">书法字体制作器</textarea>
            <div class="preview-toolbar">
                <span style="font-size: 0.8125rem; color: var(--ink-faint);">字号</span>
                <select id="fontSize">
                    <option value="24">24</option>
                    <option value="36">36</option>
                    <option value="48" selected>48</option>
                    <option value="72">72</option>
                    <option value="96">96</option>
                </select>
            </div>
            <div class="preview-compare">
                <div>
                    <div class="preview-label">自定义字体</div>
                    <div class="preview-area custom-font" id="previewCustom">书法字体制作器</div>
                </div>
                <div>
                    <div class="preview-label">系统楷体</div>
                    <div class="preview-area system-font" id="previewSystem">书法字体制作器</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>书法字体制作器 — 由 <strong>谷子</strong> 研发</p>
    </footer>

    <!-- About Modal -->
    <div id="aboutModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h3 class="modal-title" style="letter-spacing: 0.1em;">书法字体制作器</h3>
            <p style="color: var(--ink-muted); font-size: 0.8125rem;">将手写字体转换为可使用的 TTF 字体文件</p>
            <div class="about-divider"></div>
            <div class="about-body">
                上传手写单字图片，输入对应标准汉字确认收录，<br>自动生成可安装的 TTF 字体文件。<br>
                支持导入已有 TTF 继续编辑。
            </div>
            <div style="margin-bottom: 1.25rem;">
                <a href="https://github.com/Claud-Lu/autotextdesign" target="_blank" rel="noopener noreferrer" style="display: inline-flex; align-items: center; gap: 0.5rem; color: var(--ink-secondary); text-decoration: none; font-size: 0.8125rem; padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: all 0.2s;">
                    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                    本项目为开源项目，欢迎 Star
                </a>
            </div>
            <div class="about-credit">
                <p>由 <span class="author">谷子</span> 研发</p>
                <p style="margin-top: 0.25rem;">有任何意见或建议，欢迎添加微信</p>
                <p class="about-wechat" style="margin-top: 0.375rem;">shibuyasan</p>
            </div>
            <div style="margin-top: 1.25rem;">
                <button id="closeAbout" class="btn btn-primary">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // ===== State =====
        let pending = [];        // [{id, image_base64}]
        let glyphs = new Map();  // char → image_base64
        let fontName = '未命名字体';
        let fontVersion = 0;
        let previewDebounce = null;

        // ===== DOM =====
        const fontNameInput = document.getElementById('fontNameInput');
        const glyphCount = document.getElementById('glyphCount');
        const pendingGrid = document.getElementById('pendingGrid');
        const confirmedGrid = document.getElementById('confirmedGrid');
        const uploadArea = document.getElementById('uploadArea');
        const previewInput = document.getElementById('previewInput');
        const fontStatus = document.getElementById('fontStatus');
        const downloadFontBtn = document.getElementById('downloadFontBtn');

        // ===== Init =====
        setupEventListeners();
        updateUI();

        // ===== Event Listeners =====
        function setupEventListeners() {
            // Font name
            fontNameInput.addEventListener('input', () => {
                fontName = fontNameInput.value.trim() || '未命名字体';
            });

            // Import TTF
            document.getElementById('importTtfBtn').addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.ttf';
                input.onchange = (e) => {
                    if (e.target.files[0]) importTTF(e.target.files[0]);
                };
                input.click();
            });

            // About
            document.getElementById('aboutBtn').addEventListener('click', () => {
                document.getElementById('aboutModal').classList.add('show');
            });
            document.getElementById('closeAbout').addEventListener('click', () => {
                document.getElementById('aboutModal').classList.remove('show');
            });

            // Tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // Upload
            uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
            uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) uploadImage(file);
            });
            uploadArea.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = (e) => { if (e.target.files[0]) uploadImage(e.target.files[0]); };
                input.click();
            });
            document.addEventListener('paste', (e) => {
                const items = e.clipboardData?.items;
                if (!items) return;
                for (const item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        uploadImage(item.getAsFile());
                        return;
                    }
                }
            });

            // Preview
            previewInput.addEventListener('input', () => {
                updatePreviewText();
                debouncedGeneratePreview();
            });
            document.getElementById('fontSize').addEventListener('change', () => {
                updatePreviewText();
            });

            // Download
            downloadFontBtn.addEventListener('click', downloadFont);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    const tabs = document.querySelectorAll('.tab');
                    const activeIndex = Array.from(tabs).findIndex(t => t.classList.contains('active'));
                    const newIndex = e.key === 'ArrowRight'
                        ? Math.min(activeIndex + 1, tabs.length - 1)
                        : Math.max(activeIndex - 1, 0);
                    tabs[newIndex].click();
                }
            });
        }

        // ===== Import TTF =====
        async function importTTF(file) {
            showToast('正在解析字体...', 'info');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/import-ttf`, { method: 'POST', body: formData });
                if (!response.ok) {
                    const error = await response.json();
                    showToast(error.detail || '导入失败', 'error');
                    return;
                }
                const result = await response.json();

                // Add imported glyphs to state
                for (const g of result.glyphs) {
                    glyphs.set(g.char, g.image_base64);
                }

                // Update font name if user hasn't changed it
                if (fontNameInput.value === '未命名字体' || !fontNameInput.value.trim()) {
                    fontName = result.font_name;
                    fontNameInput.value = fontName;
                }

                showToast(`导入成功，共 ${result.glyphs.length} 个字`, 'success');
                updateUI();
                switchTab('confirmed');
                await generatePreview();
            } catch (error) {
                console.error('Import failed:', error);
                showToast('导入失败', 'error');
            }
        }

        // ===== Upload Image =====
        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast('正在处理...', 'info');
                const response = await fetch(`${API_BASE}/preprocess`, { method: 'POST', body: formData });
                if (!response.ok) {
                    const error = await response.json();
                    showToast(error.detail || '处理失败', 'error');
                    return;
                }
                const result = await response.json();

                pending.push({
                    id: `p_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`,
                    image_base64: result.image_base64,
                });

                showToast('已添加到待确认', 'success');
                updateUI();
                switchTab('pending');
            } catch (error) {
                console.error('Upload failed:', error);
                showToast('上传失败', 'error');
            }
        }

        // ===== Confirm =====
        function confirmPending(id) {
            const input = document.querySelector(`input[data-id="${id}"]`);
            const label = input.value.trim();
            if (!label) { showToast('请输入标准字', 'error'); return; }
            if (!/^[\u4e00-\u9fff]$/.test(label)) { showToast('请输入单个汉字', 'error'); return; }

            const item = pending.find(p => p.id === id);
            if (!item) return;

            // If char already exists, overwrite
            glyphs.set(label, item.image_base64);
            pending = pending.filter(p => p.id !== id);

            showToast(`已收录: ${label}`, 'success');
            updateUI();
            switchTab('confirmed');
            debouncedGeneratePreview();
        }

        // ===== Delete =====
        function deletePending(id) {
            pending = pending.filter(p => p.id !== id);
            updateUI();
        }

        function deleteConfirmed(char) {
            glyphs.delete(char);
            updateUI();
            debouncedGeneratePreview();
        }

        // ===== Generate Preview =====
        let previewGenerating = false;

        function debouncedGeneratePreview() {
            clearTimeout(previewDebounce);
            previewDebounce = setTimeout(generatePreview, 500);
        }

        async function generatePreview() {
            if (glyphs.size === 0 || previewGenerating) return;
            previewGenerating = true;

            try {
                const glyphList = [];
                for (const [char, img_b64] of glyphs) {
                    glyphList.push({ char, image_base64: img_b64 });
                }

                const response = await fetch(`${API_BASE}/preview`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ glyphs: glyphList, font_name: fontName }),
                });

                if (!response.ok) return;

                const blob = await response.blob();
                fontVersion++;
                const url = URL.createObjectURL(blob);

                const old = document.getElementById('dynamicFont');
                if (old) old.remove();

                const style = document.createElement('style');
                style.id = 'dynamicFont';
                style.textContent = `@font-face { font-family: 'PreviewFont'; src: url('${url}') format('truetype'); }`;
                document.head.appendChild(style);

                updatePreviewText();
                downloadFontBtn.style.display = 'inline-block';
                fontStatus.textContent = `已收录 ${glyphs.size} 个字`;
            } catch (error) {
                console.error('Preview failed:', error);
            } finally {
                previewGenerating = false;
            }
        }

        // ===== Download =====
        async function downloadFont(e) {
            e.preventDefault();
            if (glyphs.size === 0) { showToast('没有已收录的字', 'error'); return; }

            showToast('正在生成字体...', 'info');
            const glyphList = [];
            for (const [char, img_b64] of glyphs) {
                glyphList.push({ char, image_base64: img_b64 });
            }

            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ glyphs: glyphList, font_name: fontName }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    showToast(error.detail || '生成失败', 'error');
                    return;
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${fontName}.ttf`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('字体下载成功', 'success');
            } catch (error) {
                console.error('Download failed:', error);
                showToast('下载失败', 'error');
            }
        }

        // ===== UI Update =====
        function updateUI() {
            glyphCount.textContent = glyphs.size;
            document.getElementById('pendingCount').textContent = `(${pending.length})`;
            document.getElementById('confirmedCount').textContent = `(${glyphs.size})`;

            if (glyphs.size === 0) {
                downloadFontBtn.style.display = 'none';
                fontStatus.textContent = '收录文字后生成预览';
            }

            renderPendingGrid();
            renderConfirmedGrid();
        }

        function renderPendingGrid() {
            pendingGrid.innerHTML = '';
            if (pending.length === 0) {
                pendingGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">砚</div>
                        <div class="empty-state-text"><p>暂无待确认字</p><p>上传字体图片开始收录</p></div>
                    </div>`;
                return;
            }

            pending.forEach(item => {
                const card = document.createElement('div');
                card.className = 'char-card';
                card.innerHTML = `
                    <div class="char-image"><img src="data:image/png;base64,${item.image_base64}" alt="Pending"></div>
                    <div class="char-content">
                        <input type="text" class="char-input" data-id="${item.id}" placeholder="输入标准字" maxlength="1">
                        <div class="char-actions">
                            <button class="btn btn-success confirm-btn" data-id="${item.id}">确认</button>
                            <button class="btn btn-danger-outline delete-btn" data-id="${item.id}">删除</button>
                        </div>
                    </div>`;
                pendingGrid.appendChild(card);
            });

            pendingGrid.querySelectorAll('.confirm-btn').forEach(btn => {
                btn.addEventListener('click', () => confirmPending(btn.dataset.id));
            });
            pendingGrid.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deletePending(btn.dataset.id));
            });
        }

        function renderConfirmedGrid() {
            confirmedGrid.innerHTML = '';
            if (glyphs.size === 0) {
                confirmedGrid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">藏</div>
                        <div class="empty-state-text"><p>暂无已收录字</p><p>确认后的字显示在这里</p></div>
                    </div>`;
                return;
            }

            const sorted = [...glyphs.entries()].sort((a, b) => a[0].localeCompare(b[0]));
            sorted.forEach(([char, img_b64]) => {
                const card = document.createElement('div');
                card.className = 'char-card confirmed-char';
                card.innerHTML = `
                    <div class="char-image"><img src="data:image/png;base64,${img_b64}" alt="${char}"></div>
                    <div class="confirmed-label">${char}</div>
                    <div class="confirmed-actions">
                        <button class="btn btn-danger-outline" data-char="${char}">删除</button>
                    </div>`;
                confirmedGrid.appendChild(card);
            });

            confirmedGrid.querySelectorAll('.btn-danger-outline').forEach(btn => {
                btn.addEventListener('click', () => deleteConfirmed(btn.dataset.char));
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            pendingGrid.style.display = tab === 'pending' ? 'grid' : 'none';
            confirmedGrid.style.display = tab === 'confirmed' ? 'grid' : 'none';
        }

        function updatePreviewText() {
            const text = previewInput.value || '请输入预览文字';
            const size = document.getElementById('fontSize').value + 'px';
            const customEl = document.getElementById('previewCustom');
            const systemEl = document.getElementById('previewSystem');
            customEl.style.fontSize = size;
            systemEl.style.fontSize = size;
            customEl.textContent = text;
            systemEl.textContent = text;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
    </script>
</body>
</html>
